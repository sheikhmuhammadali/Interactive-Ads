<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Softie Cake Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        @font-face {
            font-family: 'Poppins';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/poppins/v20/pxiByp8kv8JvPjpYHFzZfCzvL-Q.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.5s ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        /* Logo Styling */
        .logo {
            position: absolute;
            top: 0;
            left: 5vw;
            width: 20vw;
            z-index: 10;
        }

        .logo img {
            width: 100%;
            height: auto;
        }

        .background-start-cta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/G3vPY8Vp/startctabg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .background-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/8kLdWJ9z/mainbg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        
        /* Start Screen */
        #start-screen {
            cursor: pointer;
        }
        
        #start-screen .instruction {
            margin-top: -8vh;
            font-size: 6vw;
            color: #fff;
            text-shadow:
                0 0 5px rgba(255,192,203,0.7),
                0 0 10px rgba(255,192,203,0.5),
                1px 1px 0 #FFC0CB,
                -1px -1px 0 #FFC0CB,
                1px -1px 0 #FFC0CB,
                -1px 1px 0 #FFC0CB;
            animation: pulse 1.5s infinite;
            letter-spacing: 0.1em;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Main Screen */
        #main-screen {
            justify-content: flex-start; /* Align content from the top */
        }

        #main-screen .content-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transform: translateY(11vh); /* Adjust this to move both cake and dish */
        }
        
        #main-screen .cake-container {
            position: relative;
            width: 80vw;
            height: auto; /* Change height to auto to fit both images */
            display: flex;
            flex-direction: column; /* Stack the images vertically */
            justify-content: flex-end; /* Align to the bottom of the container */
            align-items: center; /* Center horizontally */
            transform: translateY(-3vh);
        }

        #main-screen .cake {
            position: relative; /* Add this line */
            z-index: 2; /* Add this line */
            width: 80%; /* Adjust size as needed */
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #main-screen .dish {
            position: relative; /* Add this line */
            z-index: 1; /* Add this line */
            width: 100%; /* Make the dish fill the container's width */
            height: auto;
            margin-top: -6vw; /* Adjust this negative margin to control the vertical overlap with the cake */
        }

        #main-screen .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: ring-pulse 1s forwards;
        }

        @keyframes ring-pulse {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* Squish effect */
        /* Squish effect now only affects the cake */
        .squish .cake {
            transform: scale(0.9) translateY(5%);
        }

        /* Bounce effect now only affects the cake */
        .bounce .cake {
            animation: bounce 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }

        @keyframes bounce {
            0% { transform: scale(0.9) translateY(5%); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Dish Styling */
        .dish-container {
            position: relative;
            width: 40vw; /* Adjust width as needed */
            height: auto;
            transform: translateY(-5vh); /* Moves the dish up towards the cake */
        }
        
        .dish-container img {
            width: 200%;
            height: auto;
        }
        
        /* CTA Screen */
        #cta-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #cta-screen .instruction {
            transform: translateY(-3vh);
            font-size: 9vw;
            font-weight: 800;
            color: #fff;
            text-shadow:
                0 0 5px rgba(255,192,203,0.7),
                0 0 10px rgba(255,192,203,0.5),
                1px 1px 0 #FFC0CB,
                -1px -1px 0 #FFC0CB,
                1px -1px 0 #FFC0CB,
                -1px 1px 0 #FFC0CB;
            letter-spacing: 0.05em;
        }

        #cta-button {
            transform: translateY(30vh);
            padding: 3.5vw 7vw;
            font-size: 4vw;
            font-weight: bold;
            border: 2px solid #d1587d;
            border-radius: 50px;
            background-color: #fff;
            color: #d1587d;
            cursor: pointer;
            box-shadow: 
                0 0 10px rgba(209, 88, 125, 0.7),
                0 0 20px rgba(209, 88, 125, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #cta-button:active {
            transform: scale(0.95);
            box-shadow: none; 
        }
    </style>
</head>
<body>
    <div id="start-screen" class="screen">
        <div class="background-start-cta"></div>
        <div class="logo"><img src="https://i.postimg.cc/Kct7Lkw4/peek-fr-logo.png" alt="Brand Logo"></div>
        <div class="instruction">TAP TO FEEL THE CAKE!</div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="background-main"></div>
        <div class="logo"><img src="https://i.postimg.cc/Kct7Lkw4/peek-fr-logo.png" alt="Brand Logo"></div>
        <div class="content-container">
            <div class="cake-container">
                <img id="cake" class="cake" src="https://i.postimg.cc/pVKQ8h4x/cupcake.png" alt="Cake">
                <img id="dish" src="https://i.postimg.cc/28mQxjNG/dish.png" alt="Dish" class="dish">
            </div>
        </div>
    </div>

    <div id="cta-screen" class="screen hidden">
        <div class="background-start-cta"></div>
        <div class="logo"><img src="https://i.postimg.cc/Kct7Lkw4/peek-fr-logo.png" alt="Brand Logo"></div>
        <div class="instruction">
            SO FLUFFY YOU<br>CAN FEEL IT!
        </div>
        <button id="cta-button">TASTE THE SOFTNESS</button>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const mainScreen = document.getElementById('main-screen');
        const ctaScreen = document.getElementById('cta-screen');
        const cake = document.getElementById('cake');
        const cakeContainer = mainScreen.querySelector('.cake-container');
        
        // No more image swapping, all visual effects are now handled by CSS transforms
        
        // Function to handle screen transitions
        function showScreen(screenToShow) {
            const allScreens = [startScreen, mainScreen, ctaScreen];
            allScreens.forEach(screen => {
                if (screen === screenToShow) {
                    screen.classList.remove('hidden');
                } else {
                    screen.classList.add('hidden');
                }
            });
        }

        // --- Start Screen Logic ---
        startScreen.addEventListener('click', () => {
            showScreen(mainScreen);
            
            // Set a timer to transition to the CTA screen after 10 seconds
            setTimeout(() => {
                showScreen(ctaScreen);
            }, 10000);
        });

        // --- Main Screen Logic (Squish Moment) ---
        function handleTouchStart(e) {
            e.preventDefault();
            
            // Haptic Feedback (Vibration)
            if ("vibrate" in navigator) {
                navigator.vibrate(50);
            }

            // Apply the squish effect using CSS
            cakeContainer.classList.add('squish');
            
            // Create a temporary visual ripple ring
            const ring = document.createElement('div');
            ring.className = 'pulse-ring';
            cakeContainer.appendChild(ring);
            
            setTimeout(() => {
                ring.remove();
            }, 1000);
        }

        function handleTouchEnd() {
            // Remove the squish class and apply the bounce effect
            cakeContainer.classList.remove('squish');
            cakeContainer.classList.add('bounce');
            
            // Remove the bounce class after the animation is complete
            setTimeout(() => {
                cakeContainer.classList.remove('bounce');
            }, 300);
        }
        
        // Add listeners for both mouse and touch events
        cake.addEventListener('touchstart', handleTouchStart);
        cake.addEventListener('touchend', handleTouchEnd);
        cake.addEventListener('mousedown', handleTouchStart);
        cake.addEventListener('mouseup', handleTouchEnd);

        // --- CTA Screen Logic ---
        const ctaButton = document.getElementById('cta-button');
        ctaButton.addEventListener('click', () => {
            window.open('https://www.google.com/search?q=softie+cake', '_blank');
        });

        // Set the initial screen
        document.addEventListener('DOMContentLoaded', () => {
            showScreen(startScreen);
        });
    </script>
</body>
</html>
