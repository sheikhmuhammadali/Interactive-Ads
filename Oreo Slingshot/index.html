<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="ad.size" content="width=320,height=480">
<title>Oreo Dunk Challenge</title>
<style>
  :root { 
    --hud: 72px; 
    --oreo-color: #2b1b0e;
    --glass-color: rgba(255, 255, 255, 0.7);
    --milk-color: #ffffff;
  }
  
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{
    font-family:'Arial Rounded MT Bold','Arial',sans-serif;
    background: linear-gradient(to bottom, #1E90FF, #87CEEB);
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #wrap { height: 100svh; }   /* fallback to 100vh if your linter complains */

  #wrap{ position:relative; width:100%; height:100%; }

  /* ====== GAME CANVAS ====== */
  canvas{
    position:absolute; inset:0; width:100%; height:100%; display:block;
    background: linear-gradient(#8ed1ff 0%, #bfe7ff 45%, #ffffff 46%, #fff 100%);
  }

  /* ====== HUD ====== */
  .hud{
    position:absolute; top:12px; left:12px; right:12px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:800; color:#0b3d91; text-shadow:0 2px 0 rgba(255,255,255,.6);
    pointer-events:none; z-index:10;
  }
  .pill{ min-width:64px; padding:.5rem .9rem; border-radius:999px; background:rgba(255,255,255,.85); color:#0b3d91; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,.2), 0 0 0 2px rgba(0,91,181,.4); font-size:1.1rem; display:flex; align-items:center; gap:5px; }

  /* Hint + power bar */
  #hint{
    position: absolute; left: 50%; bottom: 30%; transform: translateX(-50%); width: clamp(180px, 60vw, 360px);
    height: auto; pointer-events: none; opacity: 1; transition: opacity .3s ease; z-index: 10;
  }
  
  #power-bar{
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
    width:0; height:8px; background:linear-gradient(to right, #4caf50,#ffeb3b,#f44336);
    border-radius:4px; transition:width .2s; box-shadow:0 2px 5px rgba(0,0,0,.3); z-index:10;
  }

  /* ====== START/END SCREENS ====== */
  .screen{
    position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column; justify-content:flex-end; align-items:center;
    background:#000 center/cover no-repeat;
  }
  .screen.hidden{ display:none; }
  .cta-bar{
    width:100%; display:flex; justify-content:center; gap:16px;
    padding:24px 16px 0px;
    background: linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,0));
  }

  /* START screen CTA size */
  #start-screen .cta-bar{
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  #start-screen .cta-img{
    width: min(72vw, 420px);    /* nice big Start button */
    max-width: 520px;
    flex: 0 0 auto;
  }

  /* END screen: stack buttons vertically, bottom-most still "Visit" */
  #end-screen .cta-bar{
    flex-direction: column-reverse;       /* upside-down order */
    align-items: center;
    gap: clamp(0px, 4vh, 0px);
    padding: clamp(16px, 3vh, 28px) 16px max(24px, env(safe-area-inset-bottom));
  }
  #end-screen .cta-img{
    width: min(100vw, 460px);   /* BIG buttons */
    max-width: 560px;
    flex: 0 0 auto;            /* don't let flex shrink them */
  }

  .cta-img{
    display:block; width:clamp(180px, 36vw, 280px); height:auto;
    cursor:pointer; pointer-events:auto; user-select:none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ====== Mobile tweaks ====== */
  @media (max-width:768px){
    .pill{ font-size:1rem; padding:.4rem .8rem; }
    #hint{ font-size:.9rem; bottom:30%; max-width:280px; }
  }

  @media (max-width: 420px){
  #hint{ width: clamp(160px, 70vw, 320px); bottom: 30%; }
  }
  /* === HUD Pills: centered text, bigger, responsive, with per-pill offsets === */
  .hud .pill{
    position: relative;
    --pill-w: clamp(120px, 22vw, 200px);
    --pill-h: clamp(48px, 8vw, 64px);
    width: var(--pill-w); height: var(--pill-h);
    padding:0; border-radius:999px; background:transparent !important; box-shadow:none;
    display:grid; place-items:center; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.6);
    font-size:0; /* hide emoji */
  }
  .hud .pill > span{
    position:relative; z-index:1; line-height:1; font-weight:800;
    font-size: clamp(20px, 5vw, 36px);
    --tx: 0px; --ty: 0px; transform: translate(var(--tx), var(--ty));
  }
  .hud .pill::before{
    content:""; position:absolute; inset:0; background:center/contain no-repeat; border-radius:inherit; z-index:0;
  }
  .hud .pill-timer::before{ background-image:url('https://i.postimg.cc/BQssXCSH/timer.png'); }
  .hud .pill-score::before{ background-image:url('https://i.postimg.cc/T1vxjVr8/score.png'); }

  .hud .pill-timer{ --pill-w: clamp(92px, 24vw, 220px); --pill-h: clamp(54px, 9vw, 70px); }
  .hud .pill-score{ --pill-w: clamp(160px, 26vw, 240px); --pill-h: clamp(54px, 9vw, 70px); }

  /* adjust number positions here if the PNG artwork isn't perfectly centered */
  .hud .pill-timer > span{ --tx: 2px;  --ty: -10px; }
  .hud .pill-score > span{ --tx: 20px; --ty: -9px; }

  @media (max-width:420px){ .hud .pill > span{ font-size:clamp(18px, 6vw, 28px); } }

  /* Splash text for dunk */
  /* Generic splash element (text or image): same fade/float animation */
  .splash{
    position: absolute; pointer-events: none; animation: splashAnim 1s forwards; z-index: 15;
  }

  /* If it's an <img>, give it a soft shadow; width set from JS */
  .splash-img{
    height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }

  @keyframes splashAnim{
    0%{opacity:0; transform:translateY(0) scale(.5);}
    50%{opacity:1; transform:translateY(-40px) scale(1.2);}
    100%{opacity:0; transform:translateY(-80px) scale(1);}
  }
</style>
</head>
<body>
  <div id="wrap">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen">
      <!-- set by JS with your background image -->
      <div class="cta-bar">
        <img id="start-btn" class="cta-img" src="" alt="Start" />
      </div>
    </div>

    <!-- GAME -->
    <canvas id="c"></canvas>
    <div class="hud">
      <div class="pill pill-timer">⏱ <span id="t">25</span></div>
      <div class="pill pill-score">🍪 <span id="s">00</span></div>
    </div>
    <img id="hint" src="https://i.postimg.cc/xd7n8D81/instructions.png"/>
    <div id="power-bar"></div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen hidden">
      <div class="cta-bar">
        <img id="replay-btn" class="cta-img" src="" alt="Play Again" />
        <img id="visit-btn"  class="cta-img" src="" alt="Visit Site" />
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas   = document.getElementById('c');
  const ctx      = canvas.getContext('2d');

  // UI elements
  const scoreEl  = document.getElementById('s');
  const timeEl   = document.getElementById('t');
  const hintEl   = document.getElementById('hint');
  const powerBar = document.getElementById('power-bar');

  // Screens & CTAs
  const startScreen = document.getElementById('start-screen');
  const endScreen   = document.getElementById('end-screen');
  const startBtn    = document.getElementById('start-btn');
  const replayBtn   = document.getElementById('replay-btn');
  const visitBtn    = document.getElementById('visit-btn');

  // --- Asset placeholders (⚠️ replace with your actual file names/URL) ---
  const ASSETS = {
    background: 'https://i.postimg.cc/PfDrLxms/Background.jpg',    
    slingshot:  'https://i.postimg.cc/8PHGWrc3/Sling.png',
    milkglass:  'https://i.postimg.cc/vT9QshHY/Glass.png',
    milkglass_dunk: 'https://i.postimg.cc/ZKVbHxYC/splash.png',
    oreo:       'https://i.postimg.cc/JnkmB6Hc/oreo.png',

    start_bg:   'https://i.postimg.cc/Qdd3qxWM/startscreen.jpg',
    start_cta:  'https://i.postimg.cc/Bb50mjgj/Start.png',    
    end_bg:     'https://i.postimg.cc/Dzm77y2N/endscreen.jpg', 
    end_replay: 'https://i.postimg.cc/mgmbxFGM/playagain.png', 
    end_visit:  'https://i.postimg.cc/BQGZ20g8/CTA.png',
    dunk_label: 'https://i.postimg.cc/jdQxXFgM/dunked.png'
  };
  const VISIT_URL = 'https://example.com'; // <-- put your landing URL here

  // preload
  const IMAGES = {};
  for (const key in ASSETS){ const img=new Image(); img.src=ASSETS[key]; IMAGES[key]=img; }
  const imgReady = (img)=>img && img.complete && img.naturalWidth>0;

  // world units are in CSS px; we scale for DPR in draw()
  let W=0, H=0, DPR=1;

  // game state
  const slingYPad = 120; // distance from bottom
  const oreo = { x:0, y:0, r:28, vx:0, vy:0, dragging:false, launched:false, rotation:0 };
  const glass= { x:0, y:0, w:90, h:140, dir:2.2, dunkUntil:0 };
  const gravity = 0.15;
  const damping = 1;

  let score = 0;
  let timeLeft = 25;
  let running = false;
  let rafId = 0;
  let timerId = 0;
  let power = 0;
  let lastSplashTime = 0;

  // helpers
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const nowMs=()=>Date.now();

  function applyScreenArt(){
    // set the full background (not just background-image) so it covers
    startScreen.style.background = `url('${ASSETS.start_bg}') center / cover no-repeat`;
    endScreen.style.background   = `url('${ASSETS.end_bg}') center / cover no-repeat`;

    // CTA images
    startBtn.src  = ASSETS.start_cta;
    replayBtn.src = ASSETS.end_replay;
    visitBtn.src  = ASSETS.end_visit;
  }

  // In resize() add/keep this so power scales when the screen changes
  function resize(){
    DPR = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
    const wrapRect = document.getElementById('wrap').getBoundingClientRect();
    W = Math.floor(wrapRect.width  || window.innerWidth);
    H = Math.floor(wrapRect.height || window.innerHeight); 
    canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);

    oreo.x = W*0.5; oreo.y = H - slingYPad;
    glass.y = Math.round(H*0.22);
    glass.x = clamp(glass.x || W*0.5 - glass.w*0.5, 8, W - glass.w - 8);

    startBtn.src  = ASSETS.start_cta;
    replayBtn.src = ASSETS.end_replay;
    visitBtn.src  = ASSETS.end_visit;

    maxAllowedPull = calcMaxAllowedPull();     // NEW
  }

  function showGame(){
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    canvas.style.display='block';
    document.querySelector('.hud').style.display='flex';
    hintEl.style.display='block';
    powerBar.style.display='block';
    resize(); 
    start(); // begin gameplay
  }

  window.addEventListener('resize', resize);

  // input (Pointer Events unify mouse+touch)
  // --- add near other state vars ---
  let pointerId = null, pullStartY = 0, maxPullDistance = 0;
  let currentPull = 0;               // NEW: track pull at release
  let maxAllowedPull = 0;            // NEW: dynamic per-viewport
  
  function calcMaxAllowedPull() {
    // Scale with viewport height but keep sane bounds
    // ~30–35% of height feels good on phones; clamp to 160–260px
    return clamp(Math.round(H * 0.33), 160, 260);
  }
  function getPos(e){
    const r = canvas.getBoundingClientRect();
    // Pointer Events first, fall back to Touch/Mouse just in case
    const px = (e.clientX !== undefined) ? e.clientX
             : (e.touches && e.touches[0]) ? e.touches[0].clientX
             : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX
             : 0;
    const py = (e.clientY !== undefined) ? e.clientY
             : (e.touches && e.touches[0]) ? e.touches[0].clientY
             : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY
             : 0;
    return { x: px - r.left, y: py - r.top };
  }

  
  // ===== INPUT =====
  canvas.addEventListener('pointerdown',(e)=>{
    if (!running) return;
    const p = getPos(e);
    if (dist(p.x,p.y,oreo.x,oreo.y) <= oreo.r+12){
      pointerId = e.pointerId; canvas.setPointerCapture(pointerId);
      oreo.dragging = true; oreo.launched = false; oreo.vx = oreo.vy = 0;
      pullStartY = p.y; maxPullDistance = 0; currentPull = 0; power = 0;
      maxAllowedPull = calcMaxAllowedPull();   // ensure fresh on touch start
      e.preventDefault();
    }
  },{passive:false});

  canvas.addEventListener('pointermove',(e)=>{
    if (!running) return;
    if (pointerId !== e.pointerId || !oreo.dragging) return;
    const p = getPos(e);

    const pullDistance = Math.max(0, p.y - pullStartY);        // only downward
    maxPullDistance = Math.max(maxPullDistance, pullDistance);
    const limitedPull = Math.min(pullDistance, maxAllowedPull);

    currentPull = limitedPull;                                 // NEW: remember live pull
    power = (limitedPull / maxAllowedPull) * 100;              // UI only
    powerBar.style.width = `${power}%`;

    oreo.y = H - slingYPad + limitedPull;                      // visual pocket
    e.preventDefault();
  },{passive:false});

  canvas.addEventListener('pointerup',(e)=>{
    if (!running) return;
    if (pointerId !== e.pointerId) return;
    if (oreo.dragging){
      // Use the *actual* pull at release and scale to viewport height
      const pullRatio = clamp(currentPull / (maxAllowedPull || 1), 0, 1);

      // Base velocity scales with H so phones get enough lift.
      // On 800px tall screens this yields ~30–34; on tall phones ~36–44.
      const VBASE = Math.max(20, 16 + H * 0.02);

      oreo.vy = -(VBASE * pullRatio);

      // Keep a tiny, stable horizontal jitter so arc feels alive (optional)
      oreo.vx = (Math.random() - 0.5) * clamp(W / 240, 2, 5);

      oreo.dragging = false; oreo.launched = true; oreo.rotation = 0;
      powerBar.style.width = '0'; hintEl.style.opacity = 0.0;
    }
    pointerId = null;
  });


  function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

  /* ====== SCREENS CONTROL ====== */
  function showStartScreen(){
    // hide game layers
    startScreen.classList.remove('hidden');
    endScreen.classList.add('hidden');
    canvas.style.display='none';
    document.querySelector('.hud').style.display='none';
    hintEl.style.display='none';
    powerBar.style.display='none';
    stopLoops();
  }
  function showEndScreen(){
    endScreen.classList.remove('hidden');
    canvas.style.display='none';
    document.querySelector('.hud').style.display='none';
    hintEl.style.display='none';
    powerBar.style.display='none';
  }

  // CTA events
  startBtn.addEventListener('click', showGame);
  replayBtn.addEventListener('click', showGame);
  visitBtn.addEventListener('click', ()=>{ window.location.href = VISIT_URL; });

  /* ====== GAME CONTROL ====== */
  function start(){
    running=true;
    score=0; scoreEl.textContent="00";
    timeLeft=25; timeEl.textContent=timeLeft;
    hintEl.style.opacity=1.0;

    oreo.x=W*0.5; oreo.y=H-slingYPad; oreo.vx=oreo.vy=0; oreo.launched=false;

    // 🔧 Glass sizing tuned for mobile (smaller) and placed higher
    const isPhone = W <= 480;
    const wFrac   = isPhone ? 0.26 : 0.30;  // width fraction of viewport
    const hFrac   = isPhone ? 0.26 : 0.30;  // height fraction of viewport

    glass.w = clamp(W * wFrac, 120, 260);
    glass.h = clamp(H * hFrac, 120, 260);

    // higher on screen (smaller y = higher)
    glass.y = Math.round(H * (isPhone ? 0.14 : 0.12));
    glass.x = W * 0.5 - glass.w * 0.5;

    glass.baseSpeed = clamp(W/180, 1.6, 3.2);
    glass.dir = (Math.sign(Math.random()-.5)||1) * glass.baseSpeed;
    updateGlassSpeed();
    glass.dunkUntil = 0;

    stopLoops();
    rafId = requestAnimationFrame(tick);
    timerId = setInterval(()=>{ timeLeft--; timeEl.textContent=timeLeft; if(timeLeft<=0) end(); },1000);
  }

  function stopLoops(){ cancelAnimationFrame(rafId); clearInterval(timerId); }
  function end(){
    running=false;
    stopLoops();
    showEndScreen();
  }

  // main loop
  function tick(){
    // glass motion
    glass.x += glass.dir;
    if (glass.x<=8 || glass.x+glass.w>=W-8) glass.dir*=-1;

    // oreo physics
    if (oreo.launched){
      oreo.x+=oreo.vx; oreo.y+=oreo.vy; oreo.vy+=gravity;
      oreo.vx*=damping; oreo.vy*=damping; oreo.rotation+=oreo.vx*0.05;

      // out of bounds - TOP, BOTTOM, LEFT, RIGHT
      const offTop    = oreo.y < -50;     // reset as soon as Oreo goes 50px above screen
      const offBottom = oreo.y > H + 120; // below bottom
      const offLeft   = oreo.x < -100;    // far left
      const offRight  = oreo.x > W + 100; // far right

      if (offTop || offBottom || offLeft || offRight) {
        resetOreo(); // destroy and spawn new Oreo
      }
    }

    // dunk detection
    if (oreo.launched &&
        oreo.x>glass.x && oreo.x<glass.x+glass.w &&
        oreo.y>glass.y && oreo.y<glass.y+glass.h){
      score++; updateGlassSpeed(); scoreEl.textContent=String(score).padStart(2,'0');
      createSplash(glass.x + glass.w/2, glass.y + glass.h/2);
      glass.dunkUntil=nowMs()+400;
      resetOreo();
    }

    draw();
    if (running) rafId=requestAnimationFrame(tick);
  }

  function resetOreo(){
    oreo.launched=false; oreo.vx=oreo.vy=0; oreo.rotation=0;
    oreo.x=W*0.5; oreo.y=H-slingYPad;
  }

  function createSplash(x, y){
    const now = Date.now();
    if (now - lastSplashTime < 500) return;   // rate limit
    lastSplashTime = now;

    const img = document.createElement('img');
    img.className = 'splash splash-img';
    img.src = ASSETS.dunk_label;

    // Responsive size and centering around (x,y)
    const w = Math.min(window.innerWidth * 0.35, 220); // tweak if you want bigger
    img.style.width = w + 'px';
    img.style.left  = (x - w/2) + 'px';
    img.style.top   = (y - w*0.45) + 'px';    // lift slightly above center

    document.getElementById('wrap').appendChild(img);
    setTimeout(()=> img.remove(), 1000);      // same lifetime as before
  }
  
  // slingshot image drawer (keeps elastic)
  function drawSlingshotPosts(baseY,postH,spread){
    const slingImg=IMAGES.slingshot;
    if (imgReady(slingImg)){
      const imgW=spread+120, imgH=postH+200;
      const x=(W/2)-imgW/2, y=baseY-imgH;
      ctx.drawImage(slingImg,x,y,imgW,imgH);
    }else{
      ctx.strokeStyle='#6d4b2d'; ctx.lineWidth=16; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(W/2-spread/2,baseY); ctx.lineTo(W/2-spread/2,baseY-postH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W/2+spread/2,baseY); ctx.lineTo(W/2+spread/2,baseY-postH); ctx.stroke();
    }
  }
  /* Draw an image bottom-aligned in (x,y,w,h) without distortion */
  function drawContainBottom(img, x, y, w, h){
    const iw = img.naturalWidth  || img.width;
    const ih = img.naturalHeight || img.height;
    if (!iw || !ih) return;

    const scale = Math.min(w / iw, h / ih);   // contain
    const dw = iw * scale;
    const dh = ih * scale;

    const dx = x + (w - dw) / 2;              // center horizontally
    const dy = y + (h - dh);                  // align to bottom of the box
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // --- Glass speed tuning ---
  const SPEED_STEP_SCORE = 1;     // every 2 dunked
  const SPEED_STEP_MULT  = 1.2;  // +12% speed per step
  const SPEED_CAP_MIN    = 3.5;   // px/frame lower cap
  const SPEED_CAP_MAX    = 10;     // px/frame upper cap

  function speedCap(){            // cap grows a bit with width
    return clamp(W / 80, SPEED_CAP_MIN, SPEED_CAP_MAX);
  }

  function updateGlassSpeed(){
    const sign   = Math.sign(glass.dir) || 1;
    const steps  = Math.floor(score / SPEED_STEP_SCORE);
    const speed  = Math.min(glass.baseSpeed * Math.pow(SPEED_STEP_MULT, steps), speedCap());
    glass.dir = sign * speed;
  }

  // draw
  function draw(){
    ctx.clearRect(0,0,W,H);

    const bg=IMAGES.background;
    if (imgReady(bg)){ ctx.drawImage(bg,0,0,W,H); }

    const baseY=H-40, postH=150, spread=140;
    drawSlingshotPosts(baseY,postH,spread);

    // elastic
    ctx.strokeStyle='#ce5a2b'; ctx.lineWidth=6;
    const anchorY=baseY-postH+10;
    const leftX=W/2-spread/2, rightX=W/2+spread/2;
    const pocketX=oreo.dragging?oreo.x:W/2, pocketY=oreo.dragging?oreo.y:anchorY+30;
    ctx.beginPath(); ctx.moveTo(leftX,anchorY); ctx.lineTo(pocketX,pocketY); ctx.lineTo(rightX,anchorY); ctx.stroke();

    // --- GLASS: bottom-aligned; splash overscaled to compensate transparent padding ---
    const milkImg   = IMAGES.milkglass;
    const splashImg = IMAGES.milkglass_dunk;
    const showSplash = glass.dunkUntil > nowMs() && imgReady(splashImg);
      
    if (showSplash){
      // Slight overscale so the splash overlay matches the glass rim/body
      const scale = 1.12; // tweak 1.08–1.18 if your asset needs more/less
      const Wscaled = glass.w * scale;
      const Hscaled = glass.h * scale;
      // Keep it bottom-aligned and centered over the glass box
      const dx = glass.x - (Wscaled - glass.w) * 0.5;
      const dy = glass.y - (Hscaled - glass.h);
      drawContainBottom(splashImg, dx, dy, Wscaled, Hscaled);
    } else if (imgReady(milkImg)){
      drawContainBottom(milkImg, glass.x, glass.y, glass.w, glass.h);
    } else {
      drawGlass(glass.x, glass.y, glass.w, glass.h); // vector fallback
    }
    
    
    // Oreo cookie
    const oreoImg=IMAGES.oreo;
    if (imgReady(oreoImg)){
      ctx.save(); ctx.translate(oreo.x,oreo.y); ctx.rotate(oreo.rotation);
      const d=oreo.r*2; ctx.drawImage(oreoImg,-oreo.r,-oreo.r,d,d); ctx.restore();
    } else { drawOreo(oreo.x,oreo.y,oreo.r,oreo.rotation); }
  }

  function drawGlass(x,y,w,h){
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.7)'; roundRect(ctx,x,y,w,h,10,true,false);
    const milkH=h*0.65; ctx.fillStyle='#ffffff';
    roundRect(ctx,x+4,y+h-milkH,w-8,milkH-6,8,true,false);
    ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=4; roundRect(ctx,x,y,w,14,8,false,true);
    ctx.restore();
  }
  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    if (w<2*r) r=w/2; if (h<2*r) r=h/2; ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
  }

  function drawOreo(x,y,r,rotation){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rotation);
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(0,r,r*0.95,r*0.35,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2b1b0e'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3b2a1d'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,r*0.72,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#f4f0e8'; ctx.lineWidth=2; ctx.globalAlpha=.9; ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillStyle='#f4f0e8'; ctx.font='bold '+(r/4)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('OREO',0,0);
    ctx.restore();
  }

  // boot
  resize();
  applyScreenArt();
  showStartScreen();

})();
</script>
