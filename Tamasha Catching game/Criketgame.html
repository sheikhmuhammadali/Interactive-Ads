            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 0;
        }

        #logos {
            display: flex;
            gap: 64px;
            align-items: center;
            margin-bottom: 64px;
        }

        .logo {
            width: 96px;
            height: auto;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: #DB1D17;
            stroke: black;
            font-size: 44px;
            margin-bottom: 10px;
        }

        #startGame {
            width: 200px;
            cursor: pointer;
        }

        #credit {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 390px;
            height: 844px;
            overflow: hidden;
            display: none;
            /* Initially hidden */
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #score,
        #timer {
            position: fixed;
            top: calc(8vh + 20px);
            /* Adjusts dynamically */
            left: 20px;
            color: rgb(0, 0, 0);
            font-size: clamp(16px, 3vw, 24px);
            /* Responsive font size */
            font-weight: bold;
            font-family: 'Luckiest Guy', cursive;
        }

        #timer {
            right: 10px;
            left: auto;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            width: 80%;
        }

        #playAgain {
            display: block;
            margin: 20px auto 0;
            width: 150px;
            cursor: pointer;
        }
        #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            z-index: 10;
        }
    </style>
</head>

        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let timer; // Prevent multiple timers

        function updateSizes() {
            const scaleFactor = canvas.width / 390;
            glove.width = 60 * scaleFactor;
            glove.height = 60 * scaleFactor;
            glove.y = canvas.height - glove.height -100;
            balls.forEach(ball => {
                ball.width = 40 * scaleFactor;
                ball.height = 40 * scaleFactor;
            });
        }

        function spawnBall() {
            if (!gameRunning) return;
            let x = Math.random() * (canvas.width - 40);
            balls.push({ x, y: 0, width: 40, height: 40, speed: 5 });
            setTimeout(spawnBall, 1000);
        }

        function updateGame() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(glove.img, glove.x, glove.y, glove.width, glove.height);

            balls.forEach((ball, index) => {
                ball.y += ball.speed;
                ctx.drawImage(ballImage, ball.x, ball.y, ball.width, ball.height);

                if (ball.y + ball.height >= glove.y && ball.x > glove.x && ball.x < glove.x + glove.width) {
                    score++;
                    document.getElementById("score").textContent = `Score: ${score}`;
                    balls.splice(index, 1);
                }

                if (ball.y > canvas.height) {
                    balls.splice(index, 1);
                }
            });

            requestAnimationFrame(updateGame);
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                } else {
                    timeLeft--;
                    document.getElementById("timer").textContent = `Time: ${timeLeft}`;
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false; // Stop game
            clearInterval(timer); // Stop timer
            balls = []; // Clear all balls
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear screen

            // Show Game Over screen
            document.getElementById("gameOver").style.display = "block";
            document.getElementById("finalScore").textContent = score;
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            timeLeft = 30;
            balls = [];

            // Hide Game Over screen & reset UI
            document.getElementById("gameOver").style.display = "none";
            document.getElementById("score").textContent = `Score: 0`;
            document.getElementById("timer").textContent = `Time: 30`;

            updateSizes();
            spawnBall();
            updateGame();
            startTimer();
        }

        // Fix: Make sure timer stops properly
        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame(); // Call endGame() when time runs out
                } else {
                    timeLeft--;
                    document.getElementById("timer").textContent = `Time: ${timeLeft}`;
                }
            }, 1000);
        }


        document.getElementById("startGame").addEventListener("click", function () {
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("gameContainer").style.display = "block";
            restartGame();
        });

        document.getElementById("playAgain").addEventListener("click", restartGame);

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && glove.x > 0) glove.x -= 20;
            if (e.key === "ArrowRight" && glove.x + glove.width < canvas.width) glove.x += 20;
        });

        canvas.addEventListener("touchmove", (e) => {
            let touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            glove.x = touchX - glove.width / 2;
        });
    </script>
