    <title>Wipe to Reveal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 480px;
            width: 320px;
            margin: 0 auto;
            background-color: #f4f4f4;
            background-position: center; /*display: flex; justify-content: center; align-items: center; height: 100vh; background: #000;*/
             
        }


        .container {
            position: relative;
            width: 320px;
            height: 480px;
            overflow: hidden;
            border-radius: 0px;
            
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #shopButton {
            position: absolute;
            bottom: 15px;
            text-align: center;
            left: 45%;
            transform: translateX(-50%);
            width: 103px; /* Reduced size by 50% */
            height: 49px; /* Reduced size by 50% */
            background-size: cover;
            background-color: transparent;
            z-index: 2;
            border: none;    
            cursor: pointer;
            display: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            cursor: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/4273/circular-cursor.png) 53 53, crosshair;
        }
    </style>

        }


        function erase(event) {
            let rect = canvas.getBoundingClientRect();
            let x = (event.touches ? event.touches[0].clientX : event.clientX) - rect.left;
            let y = (event.touches ? event.touches[0].clientY : event.clientY) - rect.top;

            ctx.globalCompositeOperation = "destination-out";
            ctx.beginPath();
            ctx.arc(x, y, eraserSize, 0, Math.PI * 5);
            ctx.fill();
            ctx.globalCompositeOperation = "source-over";
            checkReveal();
        }

        function checkReveal() {
            let pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearPixels = 0;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) clearPixels++;
            }
            if (clearPixels / (canvas.width * canvas.height) > 0.3) {
                fadeOutOverlay();
            }
        }

        function fadeOutOverlay() {
            canvas.style.transition = "opacity 1s ease";
            canvas.style.opacity = "0";
            setTimeout(() => {
                canvas.style.display = "none";
                document.getElementById("shopButton").style.display = "block"; // Show button
            }, 1000);
        }

        // Mouse Events
        canvas.addEventListener("mousedown", () => isDrawing = true);
        canvas.addEventListener("mousemove", (e) => isDrawing && erase(e));
        canvas.addEventListener("mouseup", () => isDrawing = false);

        // Touch Events
        canvas.addEventListener("touchstart", () => isDrawing = true);
        canvas.addEventListener("touchmove", (e) => isDrawing && erase(e));
        canvas.addEventListener("touchend", () => isDrawing = false);

        window.onload = setupCanvas;
    </script>
