<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="ad.size" content="width=320,height=480">
<title>Dipper</title>
<style>
  :root { 
    --hud: 72px; 
    --oreo-color: #2b1b0e;
    --glass-color: rgba(255, 255, 255, 0.7);
    --milk-color: #ffffff;
  }
  
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{
    font-family:'Arial Rounded MT Bold','Arial',sans-serif;
    background: linear-gradient(to bottom, #1E90FF, #87CEEB);
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #wrap { height: 100svh; }

  #wrap{ position:relative; width:100%; height:100%; }

  canvas{
    position:absolute; inset:0; width:100%; height:100%; display:block;
    background: linear-gradient(#8ed1ff 0%, #bfe7ff 45%, #ffffff 46%, #fff 100%);
  }

  .hud{
    position:absolute; top:12px; left:12px; right:12px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:800; color:#0b3d91; text-shadow:0 2px 0 rgba(255,255,255,.6);
    pointer-events:none; z-index:10;
  }
  .pill{ min-width:64px; padding:.5rem .9rem; border-radius:999px; background:rgba(255,255,255,.85); color:#0b3d91; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,.2), 0 0 0 2px rgba(0,91,181,.4); font-size:1.1rem; display:flex; align-items:center; gap:5px; }

  #hint{
    position: absolute; left: 50%; bottom: 30%; transform: translateX(-50%); width: clamp(180px, 60vw, 360px);
    height: auto; pointer-events: none; opacity: 1; transition: opacity .3s ease; z-index: 10;
  }
  
  #power-bar{
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
    width:0; height:8px; background:linear-gradient(to right, #4caf50,#ffeb3b,#f44336);
    border-radius:4px; transition:width .2s; box-shadow:0 2px 5px rgba(0,0,0,.3); z-index:10;
  }

  .screen{
    position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column; justify-content:flex-end; align-items:center;
    background:#000 center/cover no-repeat;
  }
  .screen.hidden{ display:none; }
  .cta-bar{
    width:100%; display:flex; justify-content:center; gap:16px;
    padding:24px 16px 0px;
    background: linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,0));
  }

  #start-screen .cta-bar{
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  #start-screen .cta-img{
    width: min(72vw, 420px);
    max-width: 520px;
    flex: 0 0 auto;
  }

  #end-screen .cta-bar{
    flex-direction: column-reverse;
    align-items: center;
    gap: clamp(0px, 4vh, 0px);
    padding: clamp(16px, 3vh, 28px) 16px max(24px, env(safe-area-inset-bottom));
  }
  #end-screen .cta-img{
    width: min(100vw, 460px);
    max-width: 560px;
    flex: 0 0 auto;
  }

  .cta-img{
    display:block; width:clamp(180px, 36vw, 280px); height:auto;
    cursor:pointer; pointer-events:auto; user-select:none;
    -webkit-tap-highlight-color: transparent;
  }

  @media (max-width:768px){
    .pill{ font-size:1rem; padding:.4rem .8rem; }
    #hint{ font-size:.9rem; bottom:30%; max-width:280px; }
  }

  @media (max-width: 420px){
  #hint{ width: clamp(160px, 70vw, 320px); bottom: 30%; }
  }

  .hud .pill{
    position: relative;
    --pill-w: clamp(120px, 22vw, 200px);
    --pill-h: clamp(48px, 8vw, 64px);
    width: var(--pill-w); height: var(--pill-h);
    padding:0; border-radius:999px; background:transparent !important; box-shadow:none;
    display:grid; place-items:center; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.6);
    font-size:0;
  }

  .splash{
    position: absolute; pointer-events: none; animation: splashAnim 1s forwards; z-index: 15;
  }

  .splash-img{
    height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }

  @keyframes splashAnim{
    0%{opacity:0; transform:translateY(0) scale(.5);}
    50%{opacity:1; transform:translateY(-40px) scale(1.2);}
    100%{opacity:0; transform:translateY(-80px) scale(1);}
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="start-screen" class="screen">
      <div class="cta-bar">
        <img id="start-btn" class="cta-img" src="" alt="Start" />
      </div>
    </div>

    <canvas id="c"></canvas>
    <div class="hud">
      <div class="pill pill-score">🍪 <span id="s">00</span></div>
    </div>
    <img id="hint" src="instructions.png"/>
    <div id="power-bar"></div>

    <div id="end-screen" class="screen hidden">
      <div class="cta-bar">
        <img id="replay-btn" class="cta-img" src="" alt="Play Again" />
        <img id="visit-btn"  class="cta-img" src="" alt="Visit Site" />
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas   = document.getElementById('c');
  const ctx      = canvas.getContext('2d');
  const scoreEl  = document.getElementById('s');
  const hintEl   = document.getElementById('hint');
  const powerBar = document.getElementById('power-bar');
  const startScreen = document.getElementById('start-screen');
  const endScreen   = document.getElementById('end-screen');
  const startBtn    = document.getElementById('start-btn');
  const replayBtn   = document.getElementById('replay-btn');
  const visitBtn    = document.getElementById('visit-btn');

  const ASSETS = {
    background: 'Background.jpg',    
    slingshot:  'Sling.png',
    milkglass:  'Glass.png',
    milkglass_choco: 'Chocoloate_Glass.png',
    milkglass_dunkchoco: 'Chocolate_splash.png',
    milkglass_dunk: 'splash.png',
    oreo:       'cookie.png',

    start_bg:   'startscreen.jpg',
    start_cta:  'Start.png',    
    end_bg:     'endscreen.jpg', 
    end_replay: 'playagain.png', 
    end_visit:  'CTA.png',
    dunk_label: 'dunked.png'
  };
  const VISIT_URL = 'https://example.com';

  const IMAGES = {};
  for (const key in ASSETS){ const img=new Image(); img.src=ASSETS[key]; IMAGES[key]=img; }
  const imgReady = (img)=>img && img.complete && img.naturalWidth>0;

  let W=0, H=0, DPR=1;

  const slingYPad = 120;
  const oreo = { x:0, y:0, r:28, vx:0, vy:0, dragging:false, launched:false, rotation:0 };
  const glass= { x:0, y:0, w:90, h:140, dir:2.2, dunkUntil:0 };
  const gravity = 0.15;
  const damping = 1;

  let score = 0;
  let glassFading = false;
  let glassFadeTarget = 0;
  let dunkCount = 0;
  let gameOver = false;
  let gameOverStart = 0;
  let glassFadeStart = 0;   
  const GLASS_FADE_DURATION = 800;
  let glassPhase = "normal";
  let glassFadeProgress = 0;
  let running = false;
  let rafId = 0;
  let power = 0;
  let lastSplashTime = 0;

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const nowMs=()=>Date.now();

  function applyScreenArt(){
    startScreen.style.background = `url('${ASSETS.start_bg}') center / cover no-repeat`;
    endScreen.style.background   = `url('${ASSETS.end_bg}') center / cover no-repeat`;

    startBtn.src  = ASSETS.start_cta;
    replayBtn.src = ASSETS.end_replay;
    visitBtn.src  = ASSETS.end_visit;
  }

  function resize(){
    DPR = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
    const wrapRect = document.getElementById('wrap').getBoundingClientRect();
    W = Math.floor(wrapRect.width  || window.innerWidth);
    H = Math.floor(wrapRect.height || window.innerHeight); 
    canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);

    oreo.x = W*0.5; oreo.y = H - slingYPad;
    glass.y = Math.round(H*0.22);
    glass.x = clamp(glass.x || W*0.5 - glass.w*0.5, 8, W - glass.w - 8);

    startBtn.src  = ASSETS.start_cta;
    replayBtn.src = ASSETS.end_replay;
    visitBtn.src  = ASSETS.end_visit;

    maxAllowedPull = calcMaxAllowedPull();
  }

  function showGame(){
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    canvas.style.display='block';
    document.querySelector('.hud').style.display='flex';
    hintEl.style.display='block';
    powerBar.style.display='block';
    resize(); 
    start();
  }

  window.addEventListener('resize', resize);

  let pointerId = null, pullStartY = 0, maxPullDistance = 0;
  let currentPull = 0;
  let maxAllowedPull = 0;
  
  function calcMaxAllowedPull() {
    return clamp(Math.round(H * 0.33), 160, 260);
  }
  function getPos(e){
    const r = canvas.getBoundingClientRect();
    const px = (e.clientX !== undefined) ? e.clientX
             : (e.touches && e.touches[0]) ? e.touches[0].clientX
             : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX
             : 0;
    const py = (e.clientY !== undefined) ? e.clientY
             : (e.touches && e.touches[0]) ? e.touches[0].clientY
             : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY
             : 0;
    return { x: px - r.left, y: py - r.top };
  }

  canvas.addEventListener('pointerdown',(e)=>{
    if (!running) return;
    const p = getPos(e);
    if (dist(p.x,p.y,oreo.x,oreo.y) <= oreo.r+12){
      pointerId = e.pointerId; canvas.setPointerCapture(pointerId);
      oreo.dragging = true; oreo.launched = false; oreo.vx = oreo.vy = 0;
      pullStartY = p.y; maxPullDistance = 0; currentPull = 0; power = 0;
      maxAllowedPull = calcMaxAllowedPull();
      e.preventDefault();
    }
  },{passive:false});

  canvas.addEventListener('pointermove',(e)=>{
    if (!running) return;
    if (pointerId !== e.pointerId || !oreo.dragging) return;
    const p = getPos(e);

    const pullDistance = Math.max(0, p.y - pullStartY);
    maxPullDistance = Math.max(maxPullDistance, pullDistance);
    const limitedPull = Math.min(pullDistance, maxAllowedPull);

    currentPull = limitedPull;
    power = (limitedPull / maxAllowedPull) * 100;
    powerBar.style.width = `${power}%`;

    oreo.y = H - slingYPad + limitedPull;
    e.preventDefault();
  },{passive:false});

  canvas.addEventListener('pointerup',(e)=>{
    if (!running) return;
    if (pointerId !== e.pointerId) return;
    if (oreo.dragging){
      const pullRatio = clamp(currentPull / (maxAllowedPull || 1), 0, 1);
      const VBASE = Math.max(20, 16 + H * 0.02);
      oreo.vy = -(VBASE * pullRatio);
      oreo.vx = (Math.random() - 0.5) * clamp(W / 240, 2, 5);
      oreo.dragging = false; oreo.launched = true; oreo.rotation = 0;
      powerBar.style.width = '0'; hintEl.style.opacity = 0.0;
    }
    pointerId = null;
  });

  function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

  function showStartScreen(){
    startScreen.classList.remove('hidden');
    endScreen.classList.add('hidden');
    canvas.style.display='none';
    document.querySelector('.hud').style.display='none';
    hintEl.style.display='none';
    powerBar.style.display='none';
    stopLoops();
  }
  function showEndScreen(){
    endScreen.classList.remove('hidden');
    canvas.style.display='none';
    document.querySelector('.hud').style.display='none';
    hintEl.style.display='none';
    powerBar.style.display='none';
  }

  startBtn.addEventListener('click', showGame);
  replayBtn.addEventListener('click', showGame);
  visitBtn.addEventListener('click', ()=>{ window.location.href = VISIT_URL; });

  function start(){
    running = true;
    gameOver = false;
    dunkCount = 0;   
    score = 0; 
    scoreEl.textContent = "00";
    hintEl.style.opacity = 1.0;

    oreo.x = W * 0.5; 
    oreo.y = H - slingYPad; 
    oreo.vx = oreo.vy = 0; 
    oreo.launched = false;

    const isPhone = W <= 480;
    const wFrac   = isPhone ? 0.26 : 0.30;
    const hFrac   = isPhone ? 0.26 : 0.30;

    glass.w = clamp(W * wFrac, 120, 260);
    glass.h = clamp(H * hFrac, 120, 260);

    glass.y = Math.round(H * (isPhone ? 0.14 : 0.12));
    glass.x = W * 0.5 - glass.w * 0.5;

    glass.baseSpeed = clamp(W / 180, 1.6, 3.2);
    glass.dir = (Math.sign(Math.random() - .5) || 1) * glass.baseSpeed;
    updateGlassSpeed();
    glass.dunkUntil = 0;

    stopLoops();
    rafId = requestAnimationFrame(tick);
  }

  function stopLoops(){ cancelAnimationFrame(rafId);}
  function end(){
    running=false;
    stopLoops();
    showEndScreen();
  }

  function tick(){
    if (gameOver) {
      if (nowMs() - gameOverStart > 100) {
        end();
      }
      return;
    }

    glassFadeProgress += (glassFadeTarget - glassFadeProgress) * 0.05;
    glass.x += glass.dir;
    if (glass.x <= 8 || glass.x + glass.w >= W - 8) glass.dir *= -1;

    if (oreo.launched){
      oreo.x += oreo.vx; 
      oreo.y += oreo.vy; 
      oreo.vy += gravity;
      oreo.vx *= damping; 
      oreo.vy *= damping; 
      oreo.rotation += oreo.vx * 0.05;

      const offTop = oreo.y < -50;    
      const offBottom = oreo.y > H + 120;
      const offLeft = oreo.x < -100;   
      const offRight = oreo.x > W + 100;

      if (offTop || offBottom || offLeft || offRight) {
        resetOreo();
      }
    }

    // Dunk detection
    if (oreo.launched && oreo.x > glass.x && oreo.x < glass.x + glass.w && oreo.y > glass.y && oreo.y < glass.y + glass.h) {
      score++;
      dunkCount++;

      glassFadeTarget = Math.min(1, score * 0.2);
      updateGlassSpeed();
      scoreEl.textContent = String(score).padStart(2, '0');
      createSplash(glass.x + glass.w / 2, glass.y + glass.h / 2);
      glass.dunkUntil = nowMs() + 400;

      if (score === 5 && glassPhase === "normal") {
        glassPhase = "fading";
        glassFading = true;
        glassFadeStart = nowMs();
      }
      if (glassPhase === "fading" && nowMs() - glassFadeStart > GLASS_FADE_DURATION) {
        glassPhase = "choco";
        glassFading = false;
        glassFadeProgress = 1;
      }
      glassFadeProgress = Math.min(1, score / 5);

      resetOreo();

      // ✅ End after 5 dunks, wait only 0.5 sec
      if (dunkCount >= 5 && !gameOver) {
        gameOver = true;
        gameOverStart = nowMs();
      }
    }

    draw();
    if (running) rafId = requestAnimationFrame(tick);
  }

  function resetOreo(){
    oreo.launched=false; oreo.vx=oreo.vy=0; oreo.rotation=0;
    oreo.x=W*0.5; oreo.y=H-slingYPad;
  }

  function createSplash(x, y){
    const now = Date.now();
    if (now - lastSplashTime < 500) return;
    lastSplashTime = now;

    const img = document.createElement('img');
    img.className = 'splash splash-img';
    img.src = ASSETS.dunk_label;

    const w = Math.min(window.innerWidth * 0.35, 220);
    img.style.width = w + 'px';
    img.style.left  = (x - w/2) + 'px';
    img.style.top   = (y - w*0.45) + 'px'; 

    document.getElementById('wrap').appendChild(img);
    setTimeout(()=> img.remove(), 1000);
  }
  
  function drawSlingshotPosts(baseY,postH,spread){
    const slingImg=IMAGES.slingshot;
    if (imgReady(slingImg)){
      const imgW=spread+120, imgH=postH+200;
      const x=(W/2)-imgW/2, y=baseY-imgH;
      ctx.drawImage(slingImg,x,y,imgW,imgH);
    }else{
      ctx.strokeStyle='#6d4b2d'; ctx.lineWidth=16; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(W/2-spread/2,baseY); ctx.lineTo(W/2-spread/2,baseY-postH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W/2+spread/2,baseY); ctx.lineTo(W/2+spread/2,baseY-postH); ctx.stroke();
    }
  }

  function drawContainBottom(img, x, y, w, h){
    const iw = img.naturalWidth  || img.width;
    const ih = img.naturalHeight || img.height;
    if (!iw || !ih) return;

    const scale = Math.min(w / iw, h / ih);
    const dw = iw * scale;
    const dh = ih * scale;

    const dx = x + (w - dw) / 2;
    const dy = y + (h - dh);  
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  const SPEED_STEP_SCORE = 1;  
  const SPEED_STEP_MULT  = 1.2;
  const SPEED_CAP_MIN    = 3.5;
  const SPEED_CAP_MAX    = 10; 

  function speedCap(){         
    return clamp(W / 80, SPEED_CAP_MIN, SPEED_CAP_MAX);
  }

  function updateGlassSpeed(){
    const sign   = Math.sign(glass.dir) || 1;
    const steps  = Math.floor(score / SPEED_STEP_SCORE);
    const speed  = Math.min(glass.baseSpeed * Math.pow(SPEED_STEP_MULT, steps), speedCap());
    glass.dir = sign * speed;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    const bg=IMAGES.background;
    if (imgReady(bg)){ ctx.drawImage(bg,0,0,W,H); }

    const baseY=H-40, postH=150, spread=140;
    drawSlingshotPosts(baseY,postH,spread);

    ctx.strokeStyle='#ce5a2b'; ctx.lineWidth=6;
    const anchorY=baseY-postH+10;
    const leftX=W/2-spread/2, rightX=W/2+spread/2;
    const pocketX=oreo.dragging?oreo.x:W/2, pocketY=oreo.dragging?oreo.y:anchorY+30;
    ctx.beginPath(); ctx.moveTo(leftX,anchorY); ctx.lineTo(pocketX,pocketY); ctx.lineTo(rightX,anchorY); ctx.stroke();

    const milkImg    = IMAGES.milkglass;
    const chocoImg   = IMAGES.milkglass_choco;
    const splashImg  = IMAGES.milkglass_dunk;
    const splashChocoImg = IMAGES.milkglass_dunkchoco;
    const showSplash = glass.dunkUntil > nowMs() && imgReady(splashImg);
  
    if (showSplash) {
      const scale = 1.12;
      const Wscaled = glass.w * scale;
      const Hscaled = glass.h * scale;
      const dx = glass.x - (Wscaled - glass.w) * 0.5;
      const dy = glass.y - (Hscaled - glass.h);
    
      // Choose splash type based on fade progress
      if (glassFadeProgress < 0.8 && imgReady(splashImg)) {
        // Normal milk splash
        drawContainBottom(splashImg, dx, dy, Wscaled, Hscaled);
      } else if (glassFadeProgress >= 0.8 && imgReady(splashChocoImg)) {
        // Chocolate splash only when glass nearly fully choco
        drawContainBottom(splashChocoImg, dx, dy, Wscaled, Hscaled);
      }
    }

    // Always draw normal milk base first
    if (imgReady(milkImg)) {
      drawContainBottom(milkImg, glass.x, glass.y, glass.w, glass.h);
    } else {
      drawGlass(glass.x, glass.y, glass.w, glass.h);
    }

    // Then overlay chocolate milk with fade
    if (imgReady(chocoImg)) {
      ctx.save();
      ctx.globalAlpha = glassFadeProgress;
      drawContainBottom(chocoImg, glass.x, glass.y, glass.w, glass.h);
      ctx.restore();
    }
    
    const oreoImg=IMAGES.oreo;
    if (imgReady(oreoImg)) {
      ctx.save();
      ctx.translate(oreo.x, oreo.y);
      ctx.rotate(oreo.rotation);
      const d = oreo.r * 2;
      ctx.drawImage(oreoImg, -oreo.r, -oreo.r, d, d);
      ctx.restore();
    } else {
      drawOreo(oreo.x, oreo.y, oreo.r, oreo.rotation);
    }

  }

  function drawGlass(x,y,w,h){
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.7)'; roundRect(ctx,x,y,w,h,10,true,false);
    const milkH=h*0.65; ctx.fillStyle='#ffffff';
    roundRect(ctx,x+4,y+h-milkH,w-8,milkH-6,8,true,false);
    ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=4; roundRect(ctx,x,y,w,14,8,false,true);
    ctx.restore();
  }
  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    if (w<2*r) r=w/2; if (h<2*r) r=h/2; ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
  }

  resize();
  applyScreenArt();
  showStartScreen();

})();
</script>
</body>
</html>
