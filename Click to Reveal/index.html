<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crack to Reveal Ad</title>

<style>
body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
}

#ad-container {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    perspective: 1200px;
    transform-style: preserve-3d;
}

/* STARTING BACKGROUND */
#start-bg {
    position: absolute;
    width: 100%; height: 100%;
    background-image: url("https://i.postimg.cc/bJfTcKpZ/Background.jpg");
    background-size: cover;
    background-position: center;
}

/* FINAL BACKGROUND - sits under peel layer */
#final-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("https://i.postimg.cc/26dxz2S3/first.jpg");
    background-size: cover;
    background-position: center;
    z-index: 1;
}

/* Peel wrapper - 3D peel from bottom edge */
#peel-wrapper {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    transform-origin: 50% 100%;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.6s ease-out 0.2s;
    backface-visibility: hidden;
    will-change: transform;
}

#peel-wrapper.peeling {
    transform: rotateX(-90deg);
    opacity: 0;
    pointer-events: none;
}

/* TAP AREA */
#crack-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    z-index: 5;
}

/* Crack image */
.crack-image {
    position: absolute;
    width: 120px;
    height: auto;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    transition: opacity 0.25s ease-out, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
}

.crack-state-1 { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }
.crack-state-2 { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }
.crack-state-3 { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }

/* CTA BUTTON */
#cta-btn {
    position: absolute;
    bottom: 5%;
    left: 50%; transform: translateX(-50%);
    width: 60%;
    opacity: 0;
    z-index: 20;
    transition: opacity 0.4s ease-out;
}

/* Instructions */
#instructions {
    position: absolute;
    top: 83%; 
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; /* Keep this */
    font-family: 'Inter', sans-serif;
    z-index: 6;
    pointer-events: none;
    display: flex;
    flex-direction: column;
}

#instructions .main-text {
    font-size: 26px;
    font-weight: 900;
    color: #FFD84A; /* JazzCash-style gold */
    letter-spacing: -0.3px;
    line-height: 1.1;
    margin: 0;
    
    /* --- MODIFIED CODE START --- */
    text-align: center; /* Ensures text is centered within its box */
    width: 280px; /* Adjust this width to force the desired two-line wrap */
    text-shadow:
        0px 2px 8px rgba(0, 0, 0, 0.55),
        0px 0px 6px rgba(255, 215, 0, 0.5);
}

/* SUB TEXT - Matches uploaded image */
#instructions .sub-text {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    margin-top: 10px;
    line-height: 1.3;

    text-shadow:
        0px 2px 4px rgba(0, 0, 0, 0.6);
}


/* Particle Canvas */
#particle-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 4;
}
/* FINAL SCREEN CONTENT */
#final-content {
    font-family: 'Inter', sans-serif;
    position: absolute;
    top: 0; 
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    text-align: center;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.4s ease-out;
    pointer-events: none;
}

/* Logo */
#final-logo {
    width: 120px; /* responsive */
    margin-top: 10px;
}

/* Congratulations header */
#final-header {
    font-size: 28px;
    font-weight: 900;
    color: #FFC60A;
    margin-top: 5%;
    margin-bottom: 8px;
    line-height: 1.1;
    text-shadow: 0px 2px 6px rgba(0,0,0,0.4);
}

/* Sub text (two-line) */
#final-subtext {
    font-size: 18px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
    width: 80%;
    margin: 0 auto;
}

</style>
</head>

<body>

<div id="ad-container">

    <div id="final-bg"></div>

    <!-- Peelable layer: peels away to reveal final -->
    <div id="peel-wrapper">
        <div id="start-bg"></div>
        <div id="crack-overlay"></div>
        <canvas id="particle-canvas"></canvas>
    </div>

    <div id="instructions">
        <div class="main-text">
            Tap to Reveal Your Hidden
            JazzCash Reward!</div>
        <div class="sub-text">4 Taps Needed to Unlock</div>
    </div>

    <img id="cta-btn" src="https://i.postimg.cc/pTQB2qLL/CTA.png">

    <div id="final-content">
        <img id="final-logo" src="https://i.postimg.cc/Hx12Dfdy/logo.png">
        
        <div id="final-header">CONGRATULATIONS!</div>
        
        <div id="final-subtext">
            Get Rs. 100 Bonus Cash on<br>
            your next bill payment
        </div>
    </div>
    

</div>

<script>
const TAPS_REQUIRED = 4;

const startBG = document.getElementById("start-bg");
const crackOverlay = document.getElementById("crack-overlay");
const finalBG = document.getElementById("final-bg");
const instructions = document.getElementById("instructions");
const ctaBtn = document.getElementById("cta-btn");

const particleCanvas = document.getElementById("particle-canvas");
const ctx = particleCanvas.getContext("2d");

let tapCount = 0;
let isRevealed = false;
let particles = [];

// Resize Canvas
function resizeCanvas() {
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// Particles
function createParticles(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            size: 2 + Math.random() * 3,
            life: 35 + Math.random() * 20
        });
    }
}

function updateParticles() {
    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    particles = particles.filter((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        if (p.life > 0) {
            ctx.fillStyle = "rgba(255, 255, 255, " + (p.life / 55) + ")";
            ctx.fillRect(p.x, p.y, p.size, p.size);
            return true;
        }
        return false;
    });
    requestAnimationFrame(updateParticles);
}
updateParticles();

// Tap Logic
crackOverlay.addEventListener("click", (e) => {
    if (isRevealed) return;

    tapCount++;
    instructions.style.display = "none";

    const rect = crackOverlay.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Add crack
    const crack = document.createElement("img");
    crack.src = "https://i.postimg.cc/wv5k60j7/crack.png";
    crack.classList.add("crack-image");
    crack.style.left = x + "px";
    crack.style.top = y + "px";
    crackOverlay.appendChild(crack);

    let progress = tapCount / TAPS_REQUIRED;

    if (progress >= 1) {
        crack.classList.add("crack-state-3");
        createParticles(x, y);
        revealFinalScreen();
    } else if (progress >= 0.66) {
        crack.classList.add("crack-state-3");
    } else if (progress >= 0.33) {
        crack.classList.add("crack-state-2");
    } else {
        crack.classList.add("crack-state-1");
    }
});

// Reveal Final Screen - smooth peel animation
function revealFinalScreen() {
    if (isRevealed) return;
    isRevealed = true;

    const peelWrapper = document.getElementById("peel-wrapper");
    const finalContent = document.getElementById("final-content");

    // Disable further taps
    crackOverlay.style.pointerEvents = "none";

    // Trigger peel animation
    peelWrapper.classList.add("peeling");

    // Fade in final content as peel progresses
    setTimeout(() => {
        finalContent.style.opacity = "1";
    }, 400);

    // Show CTA after peel completes
    setTimeout(() => {
        ctaBtn.style.opacity = "1";
    }, 700);

    // CTA click handler (only add once)
    ctaBtn.addEventListener("click", () => {
        window.open("https://www.advertiserswebsite.com", "_blank");
    }, { once: true });
}

</script>

</body>
</html>
