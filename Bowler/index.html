<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Cricket Wickets – 320×320 (Correct Swing + Shatter FX)</title>
<style>
  :root{ --bg:#0b5d2a; --pitch:#c7a97a; --accent:#10b981; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#0f172a;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial}
  .wrap{height:100%;display:grid;place-items:center}
  .game{position:relative;width:min(92vw, 360px);aspect-ratio:1/1;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.35)}
  canvas{width:100%;height:100%;display:block;background:var(--bg)}
  /* HUD slim and out of play area */
  .hud{position:absolute;top:4px;left:4px;right:4px;display:flex;gap:6px;justify-content:space-between;align-items:center;pointer-events:none}
  .pill{background:rgba(0,0,0,.35);padding:4px 8px;border-radius:6px;font-weight:700;color:#fff;font-size:12px;pointer-events:auto}
  .btn{pointer-events:auto;border:0;background:#111827;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer}
  .overlay{position:absolute;inset:0;display:none;place-items:center;background:rgba(0,0,0,.55);color:#fff}
  .card{background:#0b1220;border:1px solid rgba(255,255,255,.15);padding:16px;border-radius:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="game">
    <canvas id="game" width="320" height="320"></canvas>
    <div class="hud">
      <div class="pill" id="score">Score: 0</div>
      <div class="pill" id="swing">Swing: —</div>
      <div class="pill" id="balls">Balls Left: 3</div>
      <button class="btn" id="reset">Restart</button>
    </div>
    <div class="overlay" id="over">
      <div class="card">
        <h3>Innings Over</h3>
        <p id="final"></p>
        <button class="btn" id="again">Play Again</button>
      </div>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height; // 320 × 320

  // UI
  const scoreEl = document.getElementById('score');
  const ballsEl = document.getElementById('balls');
  const swingEl = document.getElementById('swing');
  const resetBtn = document.getElementById('reset');
  const over = document.getElementById('over');
  const finalEl = document.getElementById('final');
  const againBtn = document.getElementById('again');

  // Game state
  let score = 0, ballsLeft = 3, running = true;
  const ballR = 6;
  let ball = null; // {x,y,vx,vy,ax}
  let targetX = W/2;
  const targetY = H/2; // vertical middle line

  // Field
  const pitchX = W*0.25, pitchW = W*0.5;
  const stumpW = 6, stumpGap = 6, wicketH = 34;
  const wicketW = stumpW*3 + stumpGap*2; // 30
  const topWicket = { x: W/2 - wicketW/2, y: 10, w: wicketW, h: wicketH };
  const bottomWicket = { x: W/2 - wicketW/2, y: H - 18 - wicketH, w: wicketW, h: wicketH };
  const bowler = { x: W/2, y: H - 26 };

  // Swing settings (right-handed batsman perspective)
  // Outswing = left (ax < 0), Inswing = right (ax > 0)
  const SWING_ACCEL = 0.01; // subtle deviation per frame
  function chooseSwing(){
    const isIn = Math.random() < 0.5; // random each delivery
    const label = isIn ? 'Inswing →' : 'Outswing ←';
    const ax = isIn ? +SWING_ACCEL : -SWING_ACCEL;
    swingEl.textContent = `Swing: ${label}`;
    return ax;
  }

  // Shatter FX state
  let pieces = []; // rotating rectangle pieces
  let wicketBrokenTimer = 0;
  function shatterWicket(w){
    pieces.length = 0;
    // Create 3 stump pieces and 2 bails + chips
    for(let i=0;i<3;i++){
      const x = w.x + i*(stumpW+stumpGap) + stumpW/2;
      const y = w.y + w.h*0.6;
      const dir = i===0 ? -1 : (i===2 ? 1 : (Math.random()<0.5?-1:1));
      pieces.push({x,y,w:stumpW,h:w.h, vx: (1.2+Math.random()*0.8)*dir, vy: -2.2 - Math.random()*1.2, ang:0, vr: (Math.random()*0.1+0.06)*dir, life:70, color:'#8b5a2b'});
    }
    // bails
    const bailW = stumpW + stumpGap - 2, bailH = 4;
    for(let i=0;i<2;i++){
      const bx = w.x + i*(stumpW+stumpGap) + stumpW/2 + 1;
      const by = w.y - 4;
      const dir = i===0 ? -1 : 1;
      pieces.push({x:bx,y:by,w:bailW,h:bailH, vx: 2*dir, vy: -2.6, ang:0, vr:(Math.random()*0.15+0.08)*dir, life:55, color:'#dcb28a'});
    }
    // wood chips
    for(let i=0;i<10;i++){
      pieces.push({x:w.x + w.w/2, y:w.y + w.h/2, w:3, h:3, vx:(Math.random()*2-1)*2, vy:-2-Math.random()*2, ang:0, vr:(Math.random()*0.3-0.15), life:45, color:'#dcb28a'});
    }
    wicketBrokenTimer = 50; // frames to keep broken before reset
  }

  function drawPieces(){
    for(let i=pieces.length-1;i>=0;i--){
      const p = pieces[i];
      p.vy += 0.05; // gravity
      p.x += p.vx; p.y += p.vy; p.ang += p.vr; p.life--;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.ang);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life/70);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      ctx.globalAlpha = 1;
      if(p.life<=0) pieces.splice(i,1);
    }
  }

  function drawPitch(){
    // grass
    ctx.fillStyle = '#0b5d2a'; ctx.fillRect(0,0,W,H);
    // pitch
    ctx.fillStyle = '#c7a97a'; ctx.fillRect(pitchX, 0, pitchW, H);
    // creases
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.fillRect(pitchX, 18, pitchW, 3);
    ctx.fillRect(pitchX, H-21, pitchW, 3);
  }

  function drawIntactWicket(w){
    // shadow base
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(w.x + w.w/2, w.y + w.h + 2, 22, 5, 0, 0, Math.PI*2); ctx.fill();
    // stumps
    ctx.fillStyle = '#8b5a2b';
    for(let i=0;i<3;i++){
      const sx = w.x + i*(stumpW+stumpGap);
      ctx.fillRect(sx, w.y, stumpW, w.h);
    }
    // bails
    ctx.fillStyle = '#dcb28a';
    const bailW = stumpW + stumpGap - 2, bailH = 4;
    for(let i=0;i<2;i++){
      const bx = w.x + i*(stumpW+stumpGap) + 1;
      ctx.fillRect(bx, w.y-6, bailW, bailH);
    }
  }

  function drawTarget(){
    // vertical guide + horizontal bar at mid
    ctx.strokeStyle = 'rgba(16,185,129,.6)'; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(targetX, 22); ctx.lineTo(targetX, H-22); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#10b981'; ctx.fillRect(targetX-24, targetY-2.5, 48, 5);
  }
  function drawBall(){ if(!ball) return; ctx.fillStyle = '#f43f5e'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ballR, 0, Math.PI*2); ctx.fill(); }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawPitch();
    // top wicket – either intact or broken pieces
    if(wicketBrokenTimer>0){ drawPieces(); } else { drawIntactWicket(topWicket); }
    // bottom wicket (visual only)
    drawIntactWicket(bottomWicket);
    drawTarget();
    // bowler spot
    ctx.fillStyle = '#e11d48'; ctx.beginPath(); ctx.arc(bowler.x, bowler.y, 5, 0, Math.PI*2); ctx.fill();
    drawBall();
    // footer tip
    ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '12px system-ui, -apple-system, Segoe UI, Roboto'; ctx.textAlign = 'center';
    ctx.fillText('Slide horizontally to aim · Tap/Click to bowl', W/2, H-6);
  }

  function updateHUD(){ scoreEl.textContent = `Score: ${score}`; ballsEl.textContent = `Balls Left: ${ballsLeft}`; }
  function gameOver(){ running=false; over.style.display='grid'; finalEl.textContent = `You scored ${score} ${score===1?'run':'runs'}.`; }
  function reset(){ score=0; ballsLeft=3; running=true; ball=null; pieces.length=0; wicketBrokenTimer=0; swingEl.textContent='Swing: —'; updateHUD(); over.style.display='none'; }

  // Input – horizontal aim only, within pitch
  function setTargetX(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
    const rx = cx * (W/rect.width);
    targetX = Math.max(pitchX+12, Math.min(rx, pitchX + pitchW - 12));
  }
  canvas.addEventListener('pointermove', setTargetX);
  canvas.addEventListener('touchmove', setTargetX, {passive:true});

  function bowl(){
    if(!running || ball || ballsLeft<=0) return;
    const speed = 6; // base upward speed
    const dx = targetX - bowler.x;
    const dy = (topWicket.y + topWicket.h/2) - bowler.y;
    const dist = Math.hypot(dx, dy) || 1;
    const vx = (dx/dist) * speed;
    const vy = (dy/dist) * speed; // upward (negative)

    const ax = chooseSwing(); // +right (inswing), -left (outswing)
    ball = { x: bowler.x, y: bowler.y - ballR - 1, vx, vy, ax };
  }
  canvas.addEventListener('click', bowl);
  canvas.addEventListener('touchend', (e)=>{ e.preventDefault(); bowl(); }, {passive:false});

  resetBtn.addEventListener('click', reset);
  againBtn.addEventListener('click', reset);

  function step(){
    if(ball){
      // Apply small swing accel each frame
      ball.vx += ball.ax;
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Hit detection (AABB vs circle)
      if(ball.y - ballR <= topWicket.y + topWicket.h && ball.y + ballR >= topWicket.y){
        if(ball.x + ballR >= topWicket.x && ball.x - ballR <= topWicket.x + topWicket.w){
          score++; updateHUD();
          shatterWicket(topWicket);
          wicketBrokenTimer = 50;
          ball = null; ballsLeft--; if(ballsLeft<=0) gameOver();
        }
      }
      // miss
      if(ball && ball.y + ballR < 0){ ball=null; ballsLeft--; updateHUD(); if(ballsLeft<=0) gameOver(); }
      if(ball && (ball.x < 0 || ball.x > W)){ ball=null; ballsLeft--; updateHUD(); if(ballsLeft<=0) gameOver(); }
    }

    if(wicketBrokenTimer>0){ wicketBrokenTimer--; if(wicketBrokenTimer===0){ pieces.length=0; } }

    draw();
    requestAnimationFrame(step);
  }

  updateHUD();
  step();
})();
</script>
</body>
</html>
